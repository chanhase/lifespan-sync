<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終焉のシンクロニシティ - 寿命同期診断</title>

    <!-- SNSプレビュー設定 (OGP) -->
    <meta property="og:title" content="【公式】終焉のシンクロニシティ - 寿命同期診断｜統計学で導く、あなたと運命を共にするパートナーの生年月日">
    <meta property="og:description" content="あなたは誰と同じ日に人生の幕を閉じたいですか？厚生労働省の統計に基づき、あなたと同時に寿命を迎えるパートナーの生年月日を算出します。運命の相手とのシンクロ率を統計学で紐解く、新しい寿命診断シミュレーターです！">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chanhase.github.io/lifespan-sync/">
    <meta property="og:image" content="https://chanhase.github.io/lifespan-sync/og-image.jpg">

    <!-- X (Twitter) 用の設定 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="【公式】終焉のシンクロニシティ - 寿命同期診断｜統計学で導く、パートナーの生年月日">
    <meta name="twitter:description" content="厚生労働省の統計に基づき、あなたと同じ日に人生の幕を閉じるパートナーの生年月日を算出します。運命の相手とのシンクロ率をチェック！">
    <meta name="twitter:image" content="https://chanhase.github.io/lifespan-sync/og-image.jpg">

    <style>
        /* 全体のベース設定（エレガントな明朝体とグラデーション背景） */
        body { 
            font-family: 'Yu Mincho', 'Shippori Mincho', 'Noto Serif JP', serif; 
            text-align: center; 
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* グラスモーフィズム（すりガラス風）のカード */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px; 
            border-radius: 20px; 
            max-width: 500px; 
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 1.8em; margin-top: 0; color: #fbbf24; text-shadow: 0 2px 4px rgba(0,0,0,0.5); letter-spacing: 2px; }
        p.subtitle { font-size: 0.9em; color: #cbd5e1; margin-bottom: 30px; line-height: 1.6; }

        /* 入力フォームのデザイン */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.9em; color: #94a3b8; margin-bottom: 5px; }
        input, select { 
            width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; 
            font-size: 1em; font-family: inherit; transition: all 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* ボタンのデザイン */
        button { 
            background: linear-gradient(to right, #d97706, #fbbf24); 
            color: #1e1b4b; cursor: pointer; font-weight: bold; font-size: 1.1em;
            padding: 15px; border-radius: 30px; border: none; width: 100%;
            margin-top: 10px; transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3); }

        /* 診断結果エリア */
        #result-area { display: none; margin-top: 30px; animation: fadeIn 0.8s ease-out; }
        .exact-date { font-size: 1.5em; color: #fbbf24; font-weight: bold; margin: 10px 0; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .sigma-box { 
            background: rgba(0,0,0,0.4); border-radius: 10px; padding: 15px; margin-top: 15px; 
            border: 1px dashed rgba(251, 191, 36, 0.4);
        }
        .sigma-title { font-size: 0.85em; color: #94a3b8; margin-bottom: 5px; }
        .sigma-date { font-size: 1.1em; color: #e2e8f0; }
        
        /* シェアボタン */
        .share-btn {
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            margin-top: 20px; font-size: 0.9em; padding: 12px;
        }
        .share-btn:hover { background: rgba(255,255,255,0.2); }

        /* 注釈 */
        .disclaimer { font-size: 0.75em; color: #64748b; text-align: left; margin-top: 30px; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; font-family: sans-serif;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>終焉のシンクロニシティ</h2>
        <p class="subtitle">統計学が導き出す、<br>あなたと同じ日に人生の幕を閉じる運命の人の生年月日。</p>
        
        <div class="form-group">
            <label>あなたの生年月日</label>
            <input type="date" id="myBday" value="2000-01-01">
        </div>
        
        <div class="form-group">
            <label>あなたの性別</label>
            <select id="myGender">
                <option value="male">男性</option>
                <option value="female">女性</option>
            </select>
        </div>

        <div class="form-group">
            <label>パートナーの性別</label>
            <select id="pGender">
                <option value="female" selected>女性</option>
                <option value="male">男性</option>
            </select>
        </div>

        <button onclick="calculate()">運命の生年月日を導く</button>

        <!-- 結果表示エリア（最初は非表示） -->
        <div id="result-area">
            <p style="margin:0; font-size:0.9em; color:#cbd5e1;">最も確率が高い「理想の生年月日」</p>
            <div class="exact-date" id="exact-date"></div>
            
            <div class="sigma-box">
                <div class="sigma-title">運命の許容範囲 (1σ：約68%の確率で同期)</div>
                <div class="sigma-date" id="sigma-date"></div>
            </div>

            <button class="share-btn" onclick="shareResult()">結果をSNSでシェアする</button>
        </div>

        <div class="disclaimer">
            <p>※本ツールは、厚生労働省「令和5年簡易生命表」の平均寿命データに基づいた統計的なシミュレーションです。</p>
            <p>※1σ（シグマ）の範囲は、成人の寿命の標準偏差を約11年とし、合成標準偏差（約15.56年）から算出しています。</p>
        </div>
    </div>

    <script>
        // グローバル変数で結果を保持（シェア時に使うため）
        let resultExactDateStr = "";
        let resultSigmaStr = "";

        function calculate() {
            const lifeExpectancy = { male: 81.09, female: 87.14 };
            const myBdayValue = document.getElementById('myBday').value;
            const myGender = document.getElementById('myGender').value;
            const pGender = document.getElementById('pGender').value;

            if (!myBdayValue) { alert("生年月日を入力してください"); return; }
            const myBday = new Date(myBdayValue);

            // 1. 自分の死亡予測日 (うるう年考慮: 365.2425日)
            const myDeathTime = myBday.getTime() + (lifeExpectancy[myGender] * 365.2425 * 24 * 60 * 60 * 1000);
            
            // 2. パートナーの理想の誕生日（中央値）
            const pBdayTime = myDeathTime - (lifeExpectancy[pGender] * 365.2425 * 24 * 60 * 60 * 1000);
            const pBday = new Date(pBdayTime);

            // 3. 1シグマ（合成標準偏差 約15.556年）の範囲計算
            const oneSigmaMs = 15.556 * 365.2425 * 24 * 60 * 60 * 1000;
            const sigmaStart = new Date(pBdayTime - oneSigmaMs); // 上限（古い年代）
            const sigmaEnd = new Date(pBdayTime + oneSigmaMs);   // 下限（新しい年代）

            // 4. 画面への出力フォーマット
            const opt = { year: 'numeric', month: 'long', day: 'numeric' };
            resultExactDateStr = pBday.toLocaleDateString('ja-JP', opt);
            const startStr = sigmaStart.toLocaleDateString('ja-JP', { year: 'numeric', month: 'numeric', day: 'numeric' });
            const endStr = sigmaEnd.toLocaleDateString('ja-JP', { year: 'numeric', month: 'numeric', day: 'numeric' });
            resultSigmaStr = `${startStr} 〜 ${endStr}`;

            document.getElementById('exact-date').innerText = resultExactDateStr;
            document.getElementById('sigma-date').innerText = resultSigmaStr;
            
            // 結果エリアをふわっと表示
            document.getElementById('result-area').style.display = 'block';
        }

        function shareResult() {
            const shareText = `私の運命のパートナーは【${resultExactDateStr}】生まれの人でした！\n(1σの確率で ${resultSigmaStr} の間)\n\nあなたと同じ日に人生の幕を閉じるのは誰？\n#寿命同期診断 #終焉のシンクロニシティ\n`;
            const shareUrl = "https://chanhase.github.io/lifespan-sync/";

            // スマホのネイティブシェア機能（Web Share API）が使える場合
            if (navigator.share) {
                navigator.share({
                    title: '寿命同期診断',
                    text: shareText,
                    url: shareUrl
                }).catch((error) => console.log('シェアをキャンセルしました', error));
            } else {
                // PCなどの場合はX (Twitter) の投稿画面を開く
                const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
                window.open(twitterUrl, '_blank');
            }
        }
    </script>
</body>
</html>
